name: Update dependencies
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm outdated --json > outdated.json || true
      - run: npx --yes npm-check-updates -u
      - run: npm install
      - run: npm run build
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(deps): weekly update"
          file_pattern: "package.json package-lock.json"
